<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">

  <title>Frontend Mentor | QR code component</title>
</head>
<body>
  <main class="container">
    <div class="qr-code__container">
      <img class="qr-code__image" src="image-qr-code.png" alt="image qr code">
      <h1 class="qr-code__heading">Improve your front-end skills by building projects</h1>
      <p class="qr-code__subheading">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </main>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Ismail-SWE">Ismailov K</a>.
  </div>
</body>

</html>
